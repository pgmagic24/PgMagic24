<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGMagic24 Admin Login</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#1e3a8a;
color:white;
text-align:center;
padding:20px;
}

.container{
width:90%;
max-width:450px;
margin:60px auto;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input[type="text"],
input[type="password"]{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

.showpass{
margin-top:-5px;
margin-bottom:15px;
font-size:14px;
}

.btn{
width:100%;
padding:15px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.btn:hover{
background:#15803d;
}

.error{
color:red;
font-weight:bold;
margin-top:15px;
text-align:center;
}

</style>

</head>

<body>

<div class="header">
<h1>🎉 PGMagic24</h1>
<p>Admin Login</p>
</div>

<div class="container">

<div class="card">

<h2>Administrator Access</h2>

<input
type="text"
id="username"
placeholder="Enter Username">

<input
type="password"
id="password"
placeholder="Enter Password">

<div class="showpass">
<label>
<input
type="checkbox"
onclick="togglePassword()">
Show Password
</label>
</div>

<button
class="btn"
onclick="loginAdmin()">
Login </button>

<div
id="error"
class="error">
</div>

</div>

</div>

<script>

function togglePassword(){

const password =
document.getElementById("password");

if(password.type === "password"){
password.type = "text";
}
else{
password.type = "password";
}

}

function loginAdmin(){

const username =
document.getElementById("username").value.trim();

const password =
document.getElementById("password").value.trim();

if(username === "admin" && password === "pgmagic24"){

localStorage.setItem(
"adminLoggedIn",
"true"
);

window.location.href =
"admin-dashboard.html";

}
else{

document.getElementById("error").innerHTML =
"❌ Invalid Username or Password";

}

}

</script>

</body>
</html>
