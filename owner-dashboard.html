<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGMagic24 Owner Dashboard</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#1e3a8a;
color:white;
text-align:center;
padding:25px;
}

.container{
width:90%;
max-width:1000px;
margin:30px auto;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
margin-bottom:25px;
}

.card h2{
margin:0;
color:#16a34a;
}

.total{
font-size:50px;
font-weight:bold;
color:#16a34a;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-top:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#15803d;
}

.result{
margin-top:20px;
padding:15px;
background:#eef4ff;
border-radius:10px;
font-size:18px;
line-height:1.8;
color:#1e3a8a;
display:none;
}

.logout{
background:#dc2626;
}

.logout:hover{
background:#b91c1c;
}

</style>

</head>

<body>

<div class="header">
<h1>🎉 Owner Dashboard</h1>
</div>

<div class="container">

<div class="card">

<h2 id="ownerName">Loading...</h2>

<p id="businessName"></p>

<p id="ownerId"></p>

<p id="businessCode"></p>


</div>

<div class="card">

<h2>Total Participants</h2>

<div class="total" id="tenantCount">
0
</div>

</div>
<div class="card">

<h2>Total Winners</h2>

<div class="total" id="winnerCount">
0
</div>

</div>

<div class="card">

<h2>Quick Actions</h2>

<button onclick="window.location.href='owner-qr.html'">
📱 View / Download QR
</button>


<button onclick="window.location.href='winner-verification.html'">
🏆 Verify Winner
</button>

<button onclick="window.location.href='view-winners.html'">
📋 View Winners
</button>

<button class="logout" onclick="logoutOwner()">
🚪 Logout
</button>

</div>

<div class="card">

<h2>Search Tenant</h2>

<input
type="text"
id="mobile"
placeholder="Enter Tenant Mobile Number">

<button onclick="searchTenant()">
Search
</button>

<div id="result" class="result">
</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyB3e0nacuSVzH4qSi0DGA1m_wmzIcLnqx4",
authDomain:"pgmagicm.firebaseapp.com",
projectId:"pgmagicm",
storageBucket:"pgmagicm.firebasestorage.app",
messagingSenderId:"176620652925",
appId:"1:176620652925:web:15ba0db73474f03c9aa414"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ownerId =
localStorage.getItem("ownerId");

async function loadOwner(){

const ownerDocId =
localStorage.getItem("ownerDocId");

if(!ownerDocId){

window.location.href =
"owner-login.html";

return;

}

const snapshot =
await getDocs(collection(db,"owners"));

snapshot.forEach(doc=>{

if(doc.id === ownerDocId){

const data = doc.data();

document.getElementById("ownerName").innerText =
"👤 Owner Name : " + (data.fullName || "-");

document.getElementById("businessCode").innerText =
"🏢 Business Code : " + (data.businessCode || "-");

document.getElementById("ownerId").innerText =
"🆔 Owner ID : " + (data.ownerId || "-");

document.getElementById("businessName").style.display = "none";

}

});

}

async function loadTenants(){

const snapshot =
await getDocs(collection(db,"tenants"));

let count = 0;

snapshot.forEach(doc=>{

const data = doc.data();

if(data.ownerId === ownerId){

count++;

}

});

document.getElementById("tenantCount").innerText =
count;

}
async function loadWinners(){

const snapshot =
await getDocs(collection(db,"winners"));

let count = 0;

snapshot.forEach(doc=>{

const data = doc.data();

if(data.ownerId === ownerId){

count++;

}

});

document.getElementById("winnerCount").innerText =
count;

}

window.searchTenant =
async function(){

const mobile =
document.getElementById("mobile")
.value.trim();

if(!mobile){

alert("Enter Mobile Number");
return;

}

const snapshot =
await getDocs(collection(db,"tenants"));

let found = false;

snapshot.forEach(doc=>{

const data = doc.data();

if(
data.mobile === mobile &&
data.ownerId === ownerId
){

found = true;

document.getElementById("result").style.display = "block";

document.getElementById("result").innerHTML =
`
<b>Name :</b> ${data.fullName}<br>
<b>Mobile :</b> ${data.mobile}<br>
<b>Payment :</b> ${data.paymentStatus || "Paid"}<br>
<b>Status :</b> ${data.status}
`;

}

});

if(!found){

document.getElementById("result").style.display = "block";    

document.getElementById("result").innerHTML =
"<span style='color:red;font-weight:bold'>❌ Tenant Not Found</span>";

}

};

window.logoutOwner =
function(){

localStorage.clear();

window.location.href =
"owner-login.html";

};

loadOwner();
loadTenants();
loadWinners();

</script>

</body>
</html>
