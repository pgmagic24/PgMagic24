<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGMagic24 Search Mobile</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#1e3a8a;
color:white;
text-align:center;
padding:20px;
}

.container{
width:90%;
max-width:700px;
margin:30px auto;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#15803d;
}

.result{
display:none;
margin-top:20px;
padding:15px;
background:#eef4ff;
border-radius:10px;
line-height:2;
font-size:18px;
}

</style>

</head>

<body>

<div class="header">
<h1>📱 Search Mobile</h1>
<p>Admin Verification Tool</p>
</div>

<div class="container">

<div class="card">

<input
type="text"
id="mobile"
placeholder="Enter Mobile Number">

<button onclick="searchMobile()">
🔍 Search
</button>

<div id="result" class="result"></div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyB3e0nacuSVzH4qSi0DGA1m_wmzIcLnqx4",
authDomain:"pgmagicm.firebaseapp.com",
projectId:"pgmagicm",
storageBucket:"pgmagicm.firebasestorage.app",
messagingSenderId:"176620652925",
appId:"1:176620652925:web:15ba0db73474f03c9aa414"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.searchMobile = async function(){

const mobile =
document.getElementById("mobile")
.value.trim();

if(!mobile){

alert("Enter Mobile Number");
return;

}

const result =
document.getElementById("result");

result.style.display = "none";

const snapshot =
await getDocs(collection(db,"owners"));

let found = false;

snapshot.forEach(doc=>{

const data = doc.data();

if(data.mobile === mobile){

found = true;

result.style.display = "block";

result.innerHTML = `
<b>Owner Name :</b> ${data.fullName || "-"}<br>
<b>Owner ID :</b> ${data.ownerId || "-"}<br>
<b>Business :</b> ${data.businessName || "-"}<br>
<b>Business Code :</b> ${data.businessCode || "-"}<br>
<b>Mobile :</b> ${data.mobile || "-"}
`;

}

});

if(!found){

result.style.display = "block";

result.innerHTML =
"<span style='color:red;font-weight:bold'>❌ Mobile Number Not Found</span>";

}

};

</script>

</body>
</html>
