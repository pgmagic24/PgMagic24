<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGMagic24 Owner Login</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#1e3a8a;
color:white;
text-align:center;
padding:20px;
}

.container{
width:90%;
max-width:500px;
margin:40px auto;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

.btn{
width:100%;
padding:15px;
margin-top:20px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.btn:hover{
background:#15803d;
}

</style>

</head>

<body>

<div class="header">
<h1>🎉 PGMagic24</h1>
<p>Owner Login</p>
</div>

<div class="container">

<div class="card">

<label>Mobile Number OR Owner ID</label>

<input
type="text"
id="loginInput"
placeholder="Enter Mobile Number OR Owner ID">

<button
class="btn"
onclick="loginOwner()">
Login
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyB3e0nacuSVzH4qSi0DGA1m_wmzIcLnqx4",
authDomain:"pgmagicm.firebaseapp.com",
projectId:"pgmagicm",
storageBucket:"pgmagicm.firebasestorage.app",
messagingSenderId:"176620652925",
appId:"1:176620652925:web:15ba0db73474f03c9aa414"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.loginOwner = async function(){

const input =
document.getElementById("loginInput")
.value.trim();

if(!input){

alert("Enter Mobile Number OR Owner ID");
return;

}

try{

alert("Checking Owner Details...");

const snapshot =
await getDocs(collection(db,"owners"));

let found = false;

snapshot.forEach(doc=>{

const data = doc.data();

const mobile =
(data.mobile || "").toString().trim();

const ownerId =
(data.ownerId || "").toString().trim();

if(
mobile === input ||
ownerId === input
){

found = true;

localStorage.setItem(
"ownerDocId",
doc.id
);

localStorage.setItem(
"ownerId",
ownerId
);

localStorage.setItem(
"ownerName",
data.fullName || ""
);

localStorage.setItem(
"businessName",
data.businessName || ""
);

}

});

if(!found){

alert("Owner Not Found");
return;

}

window.location.href =
"owner-dashboard.html";

}
catch(error){

alert(error.message);

}

};

</script>

</body>
</html>
