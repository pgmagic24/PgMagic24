<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGMagic24 QR Generator</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#1e3a8a;
color:white;
text-align:center;
padding:20px;
}

.container{
width:90%;
max-width:700px;
margin:30px auto;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.1);
text-align:center;
}

.info{
font-size:20px;
margin:15px 0;
}

.qr{
margin-top:25px;
}

.btn{
width:100%;
padding:15px;
margin-top:15px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.btn:hover{
background:#15803d;
}

.linkbox{
margin-top:20px;
padding:10px;
background:#eef4ff;
border-radius:8px;
word-break:break-all;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">
<h1>🎉 PGMagic24 QR Generator</h1>
</div>

<div class="container">

<div class="card">

<h2>Tenant Registration QR</h2>

<div class="info">
<b>Owner ID :</b>
<span id="ownerId"></span>
</div>

<div class="info">
<b>Business Code :</b>
<span id="businessCode"></span>
</div>

<div class="qr">
<img id="qrImage" width="250">
</div>

<div class="linkbox" id="linkBox"></div>

<button class="btn" onclick="copyLink()">
📋 Copy Registration Link
</button>

<button class="btn" onclick="window.print()">
🖨️ Print QR
</button>

</div>

</div>

<script>

const ownerId =
localStorage.getItem("ownerId") || "OWN892677";

const businessCode =
localStorage.getItem("businessCode") || "BZ735250";

document.getElementById("ownerId").innerText =
ownerId;

document.getElementById("businessCode").innerText =
businessCode;

/* LIVE NETLIFY URL */

const registrationLink =
`https://tiny-jalebi-ce8292.netlify.app/tenant-register.html?owner=${ownerId}&business=${businessCode}`;

document.getElementById("linkBox").innerText =
registrationLink;

document.getElementById("qrImage").src =
`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(registrationLink)}`;

function copyLink(){

navigator.clipboard.writeText(
registrationLink
);

alert("Registration Link Copied Successfully");

}

</script>

</body>
</html>
