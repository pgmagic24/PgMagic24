<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGMagic24 Admin Dashboard</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#1e3a8a;
color:white;
text-align:center;
padding:20px;
}

.container{
width:95%;
max-width:1000px;
margin:30px auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
margin:0;
font-size:35px;
color:#16a34a;
}

.card p{
font-size:18px;
font-weight:bold;
}

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.btn{
display:block;
text-decoration:none;
text-align:center;
padding:15px;
background:#16a34a;
color:white;
border-radius:8px;
font-size:18px;
font-weight:bold;
}

.btn:hover{
background:#15803d;
}
</style>

</head>

<body>

<div class="header">
<h1>🎉 PGMagic24 Admin Dashboard</h1>
<p>Control Panel</p>
</div>

<div class="container">

<div class="cards">

<div class="card">
<h2 id="ownersCount">0</h2>
<p>Total Owners</p>
</div>

<div class="card">
<h2 id="tenantsCount">0</h2>
<p>Total Tenants</p>
</div>

<div class="card">
<h2 id="winnersCount">0</h2>
<p>Total Winners</p>
</div>

<div class="card">
<h2 id="collectionAmount">₹0</h2>
<p>Total Collection</p>
</div>

</div>

<div class="actions"> 
    
 <a href="view-owners.html" class="btn">
👥 View Owners
</a>

<a href="add-winner.html" class="btn">
🏆 Add Winner
</a>

<a href="view-winners.html" class="btn">
🎉 View Winners
</a>

<a href="search-unicode.html" class="btn">
🔍 Search Unicode
</a>

<a href="search-mobile.html" class="btn">
📱 Search Mobile
</a>

<a href="#" class="btn" onclick="logoutAdmin()">
🚪 Logout
</a>

</div>

</div>

<script type="module">

if(
localStorage.getItem("adminLoggedIn")
!== "true"
){
window.location.href =
"admin-login.html";
}

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyB3e0nacuSVzH4qSi0DGA1m_wmzIcLnqx4",
authDomain:"pgmagicm.firebaseapp.com",
projectId:"pgmagicm",
storageBucket:"pgmagicm.firebasestorage.app",
messagingSenderId:"176620652925",
appId:"1:176620652925:web:15ba0db73474f03c9aa414"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

async function loadDashboard(){

const owners =
await getDocs(
collection(db,"owners")
);

document.getElementById(
"ownersCount"
).innerText =
owners.size;

const tenants =
await getDocs(
collection(db,"tenants")
);

document.getElementById(
"tenantsCount"
).innerText =
tenants.size;

const winners =
await getDocs(
collection(db,"winners")
);

document.getElementById(
"winnersCount"
).innerText =
winners.size;

const ownerPayments =
await getDocs(
collection(db,"payments")
);

const tenantPayments =
await getDocs(
collection(db,"tenantPayments")
);

const totalCollection =
(ownerPayments.size * 50) +
(tenantPayments.size * 50);

document.getElementById(
"collectionAmount"
).innerText =
"₹" + totalCollection;

}

loadDashboard();

window.logoutAdmin = function(){

localStorage.removeItem(
"adminLoggedIn"
);

window.location.href =
"admin-login.html";

};

</script>

</body>
</html>
