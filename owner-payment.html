<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PGMagic24 Owner Payment</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#1e3a8a;
color:white;
text-align:center;
padding:20px;
}

.container{
width:90%;
max-width:700px;
margin:30px auto;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
text-align:center;
}

.info{
font-size:18px;
margin:12px 0;
}

.amount{
font-size:40px;
font-weight:bold;
color:#16a34a;
margin:20px 0;
}

.qr{
margin:25px 0;
}

.note{
color:red;
font-weight:bold;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
box-sizing:border-box;
margin-top:10px;
}

.btn{
width:100%;
padding:15px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

.btn:hover{
background:#15803d;
}

.success{
color:green;
font-weight:bold;
font-size:20px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="header">
<h1>🎉 PGMagic24</h1>
<p>Owner Registration Payment</p>
</div>

<div class="container">

<div class="card">

<h2>Registration Fee</h2>

<div class="amount">₹50</div>

<div class="info">
Owner ID :
<span id="ownerId"></span>
</div>

<div class="info">
Owner Name :
<span id="ownerName"></span>
</div>

<div class="info">
Business Name :
<span id="businessName"></span>
</div>

<div class="qr">

<p class="note">
⚠️ Pay ₹50 and enter UTR Number after payment
</p>

<img
src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=PGMagic24-Owner-Registration"
width="250"
alt="Payment QR">

</div>

<input
id="utr"
placeholder="Enter UTR Number">

<button
class="btn"
onclick="submitPayment()">
Submit Payment
</button>

<div
id="status"
class="success">
</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"pgmagicm",
storageBucket:"pgmagicm.appspot.com",
messagingSenderId:"YOUR_SENDER_ID",
appId:"YOUR_APP_ID"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const ownerId =
localStorage.getItem("ownerId");

const ownerName =
localStorage.getItem("ownerName");

const businessName =
localStorage.getItem("businessName") ||
localStorage.getItem("pgName") ||
"Business Not Available";

document.getElementById("ownerId").innerText =
ownerId || "";

document.getElementById("ownerName").innerText =
ownerName || "";

document.getElementById("businessName").innerText =
businessName || "";

window.submitPayment =
async function(){

const utr =
document.getElementById("utr").value.trim();

if(utr === ""){

alert("Please Enter UTR Number");
return;

}

if(utr.length < 6){

alert("Enter Valid UTR Number");
return;

}

try{

await addDoc(
collection(db,"payments"),
{

ownerId,
ownerName,
businessName,

amount:50,

utr,

status:"paid",

createdAt:new Date()

}
);

const unicode =
"001A001";

localStorage.setItem(
"unicode",
unicode
);

document.getElementById("status").innerHTML =
"✅ Payment Successful";

setTimeout(()=>{

window.location.href =
"owner-success.html";

},1500);

}
catch(error){

alert(error.message);
console.log(error);

}

};

</script>

</body>
</html>
```
