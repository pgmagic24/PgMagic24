<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGMagic24 Tenant Registration</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#1e3a8a;
color:white;
text-align:center;
padding:20px;
}

.container{
width:90%;
max-width:700px;
margin:30px auto;
}

.form-box{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

.info{
background:#eef4ff;
padding:12px;
border-radius:8px;
margin-bottom:20px;
}

.btn{
width:100%;
padding:15px;
margin-top:25px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.btn:hover{
background:#15803d;
}

#ageStatus{
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
<h1>🎉 PGMagic24</h1>
<p>Tenant Registration</p>
</div>

<div class="container">

<div class="form-box">

<div class="info">

<h3>🎉 Welcome To PGMagic24 Lucky Draw</h3>

<p>Register today and get your unique Unicode Number.</p>

<b>Business Code :</b>
<span id="businessDisplay"></span>

<br><br>

<b>Registration Fee :</b> ₹50

</div>

<form id="tenantForm">

<label>Full Name</label>
<input id="fullName" required>

<label>Father Name</label>
<input id="fatherName" required>

<label>Mobile Number</label>
<input id="mobile" maxlength="10" required>

<label>Address</label>
<input id="address" required>

<label>Date Of Birth</label>
<input id="dob" type="date" required>

<div id="ageStatus"></div>

<label>Aadhaar Number</label>
<input id="aadhaar" maxlength="12" required>

<button
type="submit"
class="btn"
id="submitBtn"
disabled>
Proceed To Payment
</button>

</form>

</div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const ownerId =
params.get("ownerId") || "";

const businessCode =
params.get("businessCode") || "";

document.getElementById(
"businessDisplay"
).innerText =
businessCode;

const dobInput =
document.getElementById("dob");

const ageStatus =
document.getElementById("ageStatus");

const submitBtn =
document.getElementById("submitBtn");

dobInput.addEventListener("change",()=>{

const dob =
new Date(dobInput.value);

const today =
new Date();

let age =
today.getFullYear() -
dob.getFullYear();

const m =
today.getMonth() -
dob.getMonth();

if(
m < 0 ||
(m===0 &&
today.getDate() < dob.getDate())
){
age--;
}

if(age >= 18){

ageStatus.innerHTML =
"✅ Eligible";

ageStatus.style.color =
"green";

submitBtn.disabled =
false;

}
else{

ageStatus.innerHTML =
"❌ Age must be 18+";

ageStatus.style.color =
"red";

submitBtn.disabled =
true;

}

});

document.getElementById("tenantForm")
.addEventListener("submit",(e)=>{

e.preventDefault();

const fullName =
document.getElementById("fullName").value;

const fatherName =
document.getElementById("fatherName").value;

const mobile =
document.getElementById("mobile").value;

const address =
document.getElementById("address").value;

const aadhaar =
document.getElementById("aadhaar").value;

window.location.href =
`tenant-payment.html?ownerId=${ownerId}
&businessCode=${businessCode}
&name=${encodeURIComponent(fullName)}
&father=${encodeURIComponent(fatherName)}
&mobile=${encodeURIComponent(mobile)}
&address=${encodeURIComponent(address)}
&aadhaar=${encodeURIComponent(aadhaar)}`;

});

</script>

</body>
</html>
